<section class="skeleton-section" [style.--cols]="cols">
    <!-- Label bar -->
    <div class="skeleton-bar skeleton-label shimmer"></div>

    <!-- Title bar -->
    <div class="skeleton-bar skeleton-title shimmer"></div>

    <!-- Subtitle bar -->
    <div class="skeleton-bar skeleton-subtitle shimmer"></div>

    <!-- Card grid -->
    <div class="skeleton-grid">
        <div class="skeleton-card" *ngFor="let _ of cardArray">
            <!-- Icon circle -->
            <div class="skeleton-icon shimmer"></div>

            <!-- Text lines -->
            <div class="skeleton-line skeleton-line--long shimmer"></div>
            <div class="skeleton-line skeleton-line--medium shimmer"></div>
            <div class="skeleton-line skeleton-line--short shimmer"></div>
        </div>
    </div>
</section>
