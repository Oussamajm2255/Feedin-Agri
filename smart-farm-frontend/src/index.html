  <style>
    /* ============================================
       Smart Loading Screen - Agriculture Theme
       Performance-Optimized: GPU-composited
       ============================================ */
    .loader-wrapper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      overflow: hidden;
      background: #1B5E20;
      contain: strict;
      will-change: opacity;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gradient-background {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
          #1B5E20 0%,
          #2E7D32 25%,
          #388E3C 50%,
          #2E7D32 75%,
          #1B5E20 100%);
      z-index: 1;
    }

    .gradient-background::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
          rgba(76, 175, 80, 0.2) 0%,
          rgba(27, 94, 32, 0.6) 60%,
          rgba(27, 94, 32, 0.9) 100%);
      animation: radial-breathe 6s ease-in-out infinite;
      will-change: opacity;
    }

    @keyframes radial-breathe {

      0%,
      100% {
        opacity: 0.8;
      }

      50% {
        opacity: 1;
      }
    }

    .particles-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
      contain: strict;
    }

    .particle {
      position: absolute;
      bottom: -10px;
      left: calc(var(--particle-index) * 12.5%);
      width: 3px;
      height: 3px;
      background: rgba(165, 214, 167, 0.9);
      border-radius: 50%;
      opacity: 0;
      animation: particle-float 10s ease-in infinite;
      animation-delay: calc(var(--particle-index) * 1s);
      box-shadow: 0 0 8px rgba(165, 214, 167, 0.5);
      will-change: transform, opacity;
    }

    @keyframes particle-float {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 0.7;
      }

      50% {
        opacity: 0.9;
        transform: translateY(-50vh) scale(1.3);
      }

      90% {
        opacity: 0.4;
      }

      100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }

    .loader-container {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      contain: layout style;
    }

    @media (min-width: 768px) {
      .loader-container {
        width: 300px;
        height: 300px;
      }
    }

    @media (min-width: 1025px) {
      .loader-container {
        width: 320px;
        height: 320px;
      }
    }

    .agriculture-loader {
      width: 100%;
      height: 100%;
      stroke: #A5D6A7;
      stroke-width: 3.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-miterlimit: 10;
      filter: drop-shadow(0 0 15px rgba(165, 214, 167, 0.5));
      animation: svg-breathe 3s ease-in-out infinite;
    }

    @media (max-width: 480px) {
      .agriculture-loader {
        stroke-width: 3;
      }
    }

    @keyframes svg-breathe {

      0%,
      100% {
        filter: drop-shadow(0 0 15px rgba(165, 214, 167, 0.5));
      }

      50% {
        filter: drop-shadow(0 0 30px rgba(165, 214, 167, 0.8));
      }
    }

    .loader-circle path {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: draw-line 3s ease-in-out infinite;
    }

    .loader-stem-base {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: draw-line 3s ease-in-out 0.3s infinite;
    }

    .loader-stem-mid {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: draw-line 3s ease-in-out 0.6s infinite;
    }

    .loader-stem-top {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: draw-line 3s ease-in-out 0.9s infinite;
    }

    .loader-leaf-top {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: draw-line 3s ease-in-out 1.2s infinite;
    }

    @keyframes draw-line {
      0% {
        stroke-dashoffset: 620;
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      40% {
        stroke-dashoffset: 0;
      }

      90% {
        stroke-dashoffset: 0;
        opacity: 1;
      }

      100% {
        stroke-dashoffset: 620;
        opacity: 0;
      }
    }

    .loader-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      background: radial-gradient(circle,
          rgba(76, 175, 80, 0.35) 0%,
          rgba(76, 175, 80, 0.15) 40%,
          transparent 70%);
      border-radius: 50%;
      animation: glow-expand 3s ease-in-out infinite;
      z-index: -1;
      will-change: transform, opacity;
    }

    @media (min-width: 768px) {
      .loader-glow {
        width: 220px;
        height: 220px;
      }
    }

    @keyframes glow-expand {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(0.85);
        opacity: 0.5;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1;
      }
    }

    .loader-logo {
      position: relative;
      z-index: 4;
      width: 160px;
      /* Size adjusted for prominent branding */
      height: auto;
      margin-bottom: 2rem;
      animation: logo-fade-in 0.8s ease-out 0.2s backwards;
      filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.5));
    }

    @media (min-width: 768px) {
      .loader-logo {
        width: 180px;
      }
    }

    @keyframes logo-fade-in {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader-content {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
      animation: content-fade-in 0.8s ease-out 0.4s backwards;
    }

    @media (min-width: 768px) {
      .loader-content {
        margin-top: 2.5rem;
      }
    }

    @keyframes content-fade-in {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader-message {
      color: #E8F5E9;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 400;
      margin: 0 0 1.5rem 0;
      text-align: center;
      font-family: 'Inter', 'Poppins', system-ui, sans-serif;
      letter-spacing: 1px;
      text-shadow:
        0 2px 16px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(165, 214, 167, 0.3);
      text-transform: lowercase;
    }

    .loader-message::first-letter {
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .loader-message {
        padding: 0 1.25rem;
      }
    }

    .loader-dots {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #A5D6A7;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(165, 214, 167, 0.6);
      animation: dot-bounce 1.4s ease-in-out infinite;
      will-change: transform;
    }

    .dot-1 {
      animation-delay: 0s;
    }

    .dot-2 {
      animation-delay: 0.15s;
    }

    .dot-3 {
      animation-delay: 0.3s;
    }

    @keyframes dot-bounce {

      0%,
      80%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }

      40% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .gradient-background::before,
      .particle,
      .agriculture-loader,
      .loader-circle path,
      .loader-stem-base,
      .loader-stem-mid,
      .loader-stem-top,
      .loader-leaf-top,
      .loader-glow,
      .dot,
      .loader-logo {
        animation: none !important;
      }

      .loader-circle path,
      .loader-stem-base,
      .loader-stem-mid,
      .loader-stem-top,
      .loader-leaf-top {
        stroke-dashoffset: 0 !important;
        opacity: 1 !important;
      }

      .loader-content,
      .loader-logo {
        opacity: 1;
        transform: translateY(0);
        animation: none;
      }

      .dot {
        opacity: 1 !important;
        transform: none !important;
      }
    }

    @media (prefers-contrast: high) {
      .loader-message {
        color: #FFFFFF;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
      }

      .agriculture-loader {
        stroke: #C5E1A5;
        stroke-width: 5;
      }

      .dot {
        background: #C5E1A5;
      }
    }

    @media (prefers-color-scheme: dark) {
      .loader-wrapper {
        background: #0D2818;
      }

      .gradient-background {
        background: linear-gradient(135deg,
            #0D2818 0%,
            #1B5E20 25%,
            #2E7D32 50%,
            #1B5E20 75%,
            #0D2818 100%);
      }
    }
  </style>
