version: '3.8'

services:
  # MQTT Broker (EMQX - Professional IoT MQTT)
  mqtt-broker:
    image: emqx/emqx:5.3.0
    container_name: smart-farm-mqtt
    ports:
      - "1883:1883" # MQTT
      - "8083:8083" # MQTT over WebSocket
      - "8084:8084" # MQTT over SSL
      - "18083:18083" # EMQX Dashboard
    environment:
      - EMQX_NAME=smart-farm-mqtt
      - EMQX_HOST=0.0.0.0
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=smartfarm123
      - EMQX_ACL__NOMATCH=allow
    volumes:
      - mqtt_data:/opt/emqx/data
      - mqtt_log:/opt/emqx/log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:18083/api/v5/status" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-farm-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://smartfarm:smartfarm_password@postgres:5432/smart_farm?sslmode=disable
      - JWT_SECRET=change-this-to-a-secure-random-string
      - MQTT_BROKER=mqtt://mqtt-broker:1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=smartfarm123
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: ../smart-farm-frontend
      dockerfile: Dockerfile
    container_name: smart-farm-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smart-farm-db
    environment:
      - POSTGRES_DB=smart_farm
      - POSTGRES_USER=smartfarm
      - POSTGRES_PASSWORD=smartfarm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smartfarm -d smart_farm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: smart-farm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mqtt_data:
  mqtt_log:
  redis_data:
