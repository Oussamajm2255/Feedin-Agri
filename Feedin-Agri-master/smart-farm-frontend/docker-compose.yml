version: '3.8'

services:
  smart-farm-frontend:
    build: .
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=80
    depends_on:
      - smart-farm-backend
    networks:
      - smart-farm-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  smart-farm-backend:
    image: smart-farm-backend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://smartfarm:smartfarm123@postgres:5432/smart_farm?sslmode=disable
      - MQTT_BROKER=mqtt://mosquitto:1883
      - JWT_SECRET=change-this-to-a-secure-random-string
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - smart-farm-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })" ]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=smart_farm
      - POSTGRES_USER=smartfarm
      - POSTGRES_PASSWORD=smartfarm123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-farm-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smartfarm -d smart_farm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - smart-farm-network
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:


networks:
  smart-farm-network:
    driver: bridge
