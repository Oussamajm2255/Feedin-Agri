server {
    listen $PORT;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Performance ─────────────────────────────────────────────────────
    # Gzip compression — reduces transfer sizes by ~60-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Serve pre-compressed files if available (.gz), avoids CPU overhead per-request
    gzip_static on;

    # ── Keep-Alive — reuse connections to reduce TCP handshake overhead ──
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Buffers — optimised for SPA HTML + JSON API responses ───────────
    client_body_buffer_size 16k;
    output_buffers 4 32k;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ── Static assets — 1-year immutable cache (hashed filenames) ────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Allow fonts to be loaded cross-origin (for CDN and service worker scenarios)
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── JSON / manifest files — short cache ──────────────────────────────
    location ~* \.(json|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA routing — no-cache for HTML so new deploys are picked up ─────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── Health check endpoint ─────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache" always;
    }
}

