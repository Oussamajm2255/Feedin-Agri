<main class="landing-page">
    <!-- Shared Public Navigation — same UI/UX as sub-pages -->
    <app-public-nav />

    <!-- ============================
         PAGE SECTIONS — Teasers & Gateway
         ============================ -->

    <!-- 1. Hero -->
    <app-hero-section id="hero-section" />

    <!-- The Bento Grid Ecosystem Section (Deferred for performance) -->
    @defer (on viewport; prefetch on idle) {
    <app-landing-bento-section id="bento-section"></app-landing-bento-section>
    } @placeholder {
    <app-skeleton-section [cards]="4" [cols]="2" />
    }

    <!-- 2. À propos Teaser (Deferred — loads on viewport) -->
    @defer (on viewport; prefetch on idle) {
    <app-a-propos id="about-section" />
    } @placeholder {
    <app-skeleton-section [cards]="3" [cols]="3" />
    }

    <!-- 3. Valeur & Services Teaser (Deferred — loads on viewport) -->
    @defer (on viewport; prefetch on idle) {
    <app-valeur-agricole id="valeur-section" />
    } @placeholder {
    <app-skeleton-section [cards]="3" [cols]="3" />
    }

    <!-- 4. Appel à l'action final (Deferred — loads on viewport) -->
    @defer (on viewport; prefetch on idle) {
    <app-cta-final id="cta-final-section" />
    } @placeholder {
    <app-skeleton-section [cards]="3" [cols]="3" />
    }

    <!-- SHARED FOOTER — remains eager -->
    <app-footer></app-footer>

    <!-- Global shared Back to Top Button -->
    <app-scroll-to-top></app-scroll-to-top>
</main>
