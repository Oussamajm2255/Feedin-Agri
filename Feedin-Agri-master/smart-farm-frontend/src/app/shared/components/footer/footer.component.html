<footer class="agri-footer" role="contentinfo">
  <div class="footer-content">

    <!-- Branding & Copyright -->
    <div class="footer-section footer-left">
      <div class="footer-brand">
        <img src="assets/images/logos/only_F_small.png" alt="Feedin Logo" class="footer-icon" loading="lazy"
          decoding="async" width="34" height="30">
        <span class="footer-title jersey-10-regular">FEEDIN</span>
      </div>
      <span class="footer-copyright">
        &copy; {{ currentYear }} FEEDIN. Tous droits réservés.
      </span>
    </div>

    <!-- Status Section -->
    <div class="footer-section footer-center">
      <div class="footer-status">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>System Online</span>
        </div>
      </div>
    </div>

    <!-- Version & Links Section -->
    <div class="footer-section footer-right">
      <div class="footer-info">
        <div class="version-badge">
          <mat-icon>check_circle</mat-icon>
          <span>v1.0.0</span>
        </div>
        <div class="footer-links">
          <a href="#" class="footer-link" title="Documentation">
            <mat-icon>description</mat-icon>
          </a>
          <a href="#" class="footer-link" title="Website">
            <mat-icon>public</mat-icon>
          </a>
          <a href="#" class="footer-link" title="Settings">
            <mat-icon>settings</mat-icon>
          </a>
        </div>
      </div>
    </div>

  </div>

  <!-- Decorative leaf pattern -->
  <div class="footer-decoration">
    <mat-icon class="leaf-icon leaf-1">eco</mat-icon>
    <mat-icon class="leaf-icon leaf-2">eco</mat-icon>
    <mat-icon class="leaf-icon leaf-3">eco</mat-icon>
  </div>
</footer>
